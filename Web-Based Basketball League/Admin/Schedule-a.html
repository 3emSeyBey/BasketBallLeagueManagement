<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball League - Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="schedule-a.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3 bg-white border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard-a.html">
                <div class="logo-icon me-2">🏀</div>
                <span class="fw-bold">Basketball League</span>
            </a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav gap-4">
                    <li class="nav-item"><a class="nav-link" href="dashboard-a.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="teams-a.html">Teams</a></li>
                    <li class="nav-item"><a class="nav-link active" href="schedule-a.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="standings-a.html">Standings</a></li>
                </ul>
            </div>
            <div class="profile-area" id="openAdminMenu">
                <div class="avatar-circle">👤</div>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <h2 class="fw-bold mb-1">Game Schedule</h2>
                <p class="text-muted">Viewing matches for October 2026</p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-dark px-3 py-2" style="border-radius: 10px;">Export PDF</button>
                <button class="btn btn-dark px-4 py-2" style="border-radius: 10px;">+ Create Match</button>
            </div>
        </div>

        <div class="content-card mb-4">
            <div class="row g-3">
                <div class="col-md-8 d-flex gap-2">
                    <button class="filter-pill active" onclick="filterSchedule('all', this)">All Games</button>
                    <button class="filter-pill" onclick="filterSchedule('Division A', this)">Division A</button>
                    <button class="filter-pill" onclick="filterSchedule('Division B', this)">Division B</button>
                </div>
                <div class="col-md-4">
                    <input type="date" class="form-control" id="dateSearch" style="border-radius: 10px; background: #fcfcfc;">
                </div>
            </div>
        </div>

        <div class="content-card">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="text-muted small">
                        <tr>
                            <th>DATE</th>
                            <th>TIME</th>
                            <th>MATCHUP</th>
                            <th>VENUE</th>
                            <th>DIVISION</th>
                            <th>ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="admin-drawer" id="adminDrawer">
        <div class="drawer-header mb-5">
            <div class="d-flex align-items-center gap-3">
                <div class="avatar-circle bg-white text-dark">👤</div>
                <h4 class="fw-bold m-0">Admin</h4>
            </div>
        </div>
        <nav class="drawer-nav">
            <a href="#" class="nav-item-admin">Account</a>
            <a href="#" class="nav-item-admin">Notification</a>
            <a href="#" class="nav-item-admin">Condition</a>
        </nav>
        <div class="drawer-footer mt-auto">
            <button class="btn-logout-orange">Logout 🚪</button>
        </div>
    </div>

    <div class="drawer-overlay" id="drawerOverlay"></div>

    <script src="schedule-a.js"></script>
</body>
</html>
