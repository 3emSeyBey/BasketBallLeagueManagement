<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Team Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="schedule-tm.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3 bg-white border-bottom sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="dashboard-tm.html">
                <div class="logo-icon me-2">🏀</div>
                <span class="fw-bold">Basketball League</span>
            </a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav gap-4">
                    <li class="nav-item"><a class="nav-link" href="dashboard-tm.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="players-tm.html">Players</a></li>
                    <li class="nav-item"><a class="nav-link active" href="schedule-tm.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="standings-tm.html">Standings</a></li>
                </ul>
            </div>
            <div class="profile-trigger" id="openSidebar" style="cursor: pointer;">
                <div class="avatar-circle">👤</div>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <h2 class="fw-bold mb-1">Game Schedule</h2>
                <p class="text-muted">Review upcoming and past matches for Season 2026</p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary px-3" style="border-radius: 10px;">Filter</button>
                <button class="btn btn-dark px-4" style="border-radius: 10px;">Download PDF</button>
            </div>
        </div>

        <div class="content-card">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="text-muted small">
                        <tr>
                            <th>DATE & TIME</th>
                            <th>HOME TEAM</th>
                            <th></th>
                            <th>AWAY TEAM</th>
                            <th>VENUE</th>
                            <th class="text-end pe-4">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="side-menu" id="sideMenu">
        <div class="menu-header px-4 py-4 border-bottom">
            <div class="d-flex align-items-center gap-3">
                <div class="avatar-circle">👤</div>
                <h5 class="fw-bold m-0">Team Manager</h5>
            </div>
        </div>

        <div class="menu-body px-4 py-3">
            <ul class="list-unstyled d-flex flex-column gap-4 mt-3">
                <li><a href="#" class="menu-link">Account</a></li>
                <li><a href="#" class="menu-link">Notification</a></li>
                <li><a href="#" class="menu-link">Condition</a></li>
            </ul>
        </div>

        <div class="menu-footer px-4 py-4 mt-auto">
            <button class="btn-logout w-100">Logout 🚪</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <script src="schedule-tm.js"></script>
</body>
</html>
