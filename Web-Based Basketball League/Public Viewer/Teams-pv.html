<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams - Basketball League</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="teams-pv.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3 bg-white border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard-pv.html">
                <div class="logo-icon me-2">🏀</div>
                <span class="fw-bold">Basketball League</span>
            </a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav gap-4">
                    <li class="nav-item"><a class="nav-link" href="dashboard-pv.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="teams-pv.html">Teams</a></li>
                    <li class="nav-item"><a class="nav-link" href="schedule-pv.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="standings-pv.html">Standings</a></li>
                </ul>
            </div>
            <button class="btn btn-login px-4 py-2">LOGIN</button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <h2 class="fw-bold mb-1">League Teams</h2>
                <p class="text-muted">Explore all 24 participating teams for Season 2026</p>
            </div>
        </div>

        <div class="content-card mb-4">
            <div class="row g-3 align-items-center">
                <div class="col-md-6 d-flex gap-2">
                    <button class="filter-btn active" data-division="All Teams">All Teams</button>
                    <button class="filter-btn" data-division="Division A">Division A</button>
                    <button class="filter-btn" data-division="Division B">Division B</button>
                </div>
                <div class="col-md-6">
                    <input type="text" id="teamSearch" class="form-control" placeholder="Search team name...">
                </div>
            </div>
        </div>

        <div class="row g-4" id="teams-grid">
        </div>
    </div>

    <script src="teams-pv.js"></script>
</body>
</html>
