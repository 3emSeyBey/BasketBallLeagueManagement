<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standings - Basketball League</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-pv.css">
    <link rel="stylesheet" href="standings-pv.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard-pv.html">
                <div class="logo-icon me-2">🏀</div>
                <span class="fw-bold">Basketball League</span>
            </a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav gap-4">
                    <li class="nav-item"><a class="nav-link" href="dashboard-pv.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="teams-pv.html">Teams</a></li>
                    <li class="nav-item"><a class="nav-link" href="schedule-pv.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link active" href="standings-pv.html">Standings</a></li>
                </ul>
            </div>
            <button class="btn btn-login px-4 py-2">LOGIN</button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row align-items-end mb-4">
            <div class="col-md-6">
                <h2 class="fw-bold mb-1">League Standings</h2>
                <p class="text-muted">Regular Season 2026 Rankings</p>
            </div>
            <div class="col-md-6 text-md-end">
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-dark active" onclick="filterStandings('A')">Division A</button>
                    <button type="button" class="btn btn-outline-dark" onclick="filterStandings('B')">Division B</button>
                </div>
            </div>
        </div>

        <div class="content-card p-0 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Rank</th>
                            <th>Team</th>
                            <th class="text-center">GP</th>
                            <th class="text-center">W</th>
                            <th class="text-center">L</th>
                            <th class="text-center">PCT</th>
                            <th class="text-center">STRK</th>
                            <th class="pe-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-4 d-flex gap-3 justify-content-center">
            <div class="small"><span class="badge bg-success me-1">P</span> Clinched Playoffs</div>
            <div class="small"><span class="badge bg-secondary me-1">E</span> Eliminated</div>
        </div>
    </div>

    <script src="standings-pv.js"></script>
</body>
</html>
