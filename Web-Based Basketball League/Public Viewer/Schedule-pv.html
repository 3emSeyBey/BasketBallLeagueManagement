<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Basketball League</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-pv.css">
    <link rel="stylesheet" href="schedule-pv.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard-pv.html">
                <div class="logo-icon me-2">🏀</div>
                <span class="fw-bold">Basketball League</span>
            </a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav gap-4">
                    <li class="nav-item"><a class="nav-link" href="dashboard-pv.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="teams-pv.html">Teams</a></li>
                    <li class="nav-item"><a class="nav-link active" href="schedule-pv.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="standings-pv.html">Standings</a></li>
                </ul>
            </div>
            <button class="btn btn-login px-4 py-2">LOGIN</button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Game Schedule</h2>
                <p class="text-muted">October 2026 Regular Season</p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-light border btn-sm px-3">Filter By Date</button>
                <button class="btn btn-dark btn-sm px-3">Print Schedule</button>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-3">
                <div class="content-card">
                    <h6 class="fw-bold mb-3">Refine View</h6>
                    <div class="mb-4">
                        <label class="small fw-bold text-muted text-uppercase">Division</label>
                        <select class="form-select mt-1" id="divisionFilter">
                            <option value="all">All Divisions</option>
                            <option value="A">Division A</option>
                            <option value="B">Division B</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="small fw-bold text-muted text-uppercase">Venue</label>
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" value="Plaza" id="v1" checked>
                            <label class="form-check-label small" for="v1">Bantayan Plaza</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="Cover" id="v2" checked>
                            <label class="form-check-label small" for="v2">Bantayan Covered Court</label>
                        </div>
                    </div>
                    <div class="alert alert-warning py-2 small border-0">
                        <strong>Note:</strong> Venue changes are highlighted in red.
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div id="schedule-container">
                </div>
            </div>
        </div>
    </div>

    <script src="dashboard-pv.js"></script>
    <script src="schedule-pv.js"></script>
</body>
</html>
